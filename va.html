<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virginia Speeding Ticket Cost 2026 | Calculator</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚖️</text></svg>">
    <link rel="stylesheet" href="https://fonts.googleapis.com">
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --bg: #f8fafc; --white: #ffffff; --border: #e2e8f0; }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--primary); margin: 0; padding: 0; }
        .container { max-width: 1000px; margin: 0 auto; padding: 15px; }
        .hero { text-align: center; padding: 35px 10px 20px 10px; }
        h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -0.04em; margin: 0; line-height: 1.1; }
        .calc-card { background: #fff; max-width: 550px; margin: 0 auto 40px auto; padding: 30px 20px; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        label { display: block; margin-bottom: 8px; font-size: 0.75rem; font-weight: 800; color: #64748b; text-transform: uppercase; }
        input, select { width: 100%; height: 58px; background: #f1f5f9; border: 2px solid transparent; border-radius: 14px; font-size: 16px; margin-bottom: 25px; padding: 0 15px; font-family: inherit; color: var(--primary); }
        
        .ts-check { display: flex; align-items: center; gap: 12px; margin-bottom: 30px; padding: 18px; background: #f8fafc; border-radius: 14px; border: 1px solid var(--border); cursor: pointer; font-weight: 600; }
        .ts-check input { width: 22px; height: 22px; margin: 0; accent-color: var(--accent); }
        .ts-check span { line-height: 1; display: inline-flex; align-items: center; font-size: 0.95rem; }
        
        button.main-btn { width: 100%; height: 65px; background: var(--accent); color: #fff; border: none; border-radius: 18px; font-weight: 800; font-size: 1.15rem; cursor: pointer; transition: 0.3s; }
        .results { display: none; margin-top: 30px; animation: slideUp 0.4s ease-out; }
        .ad-native { text-align: center; padding: 15px; background: #fff; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 25px; }
        .ad-native a { color: var(--accent); text-decoration: none; font-weight: 700; font-size: 0.95rem; }
        .total-box { background: var(--primary); color: #fff; padding: 30px 20px; border-radius: 22px; text-align: center; margin-bottom: 20px; }
        .val { font-size: 3.5rem; font-weight: 800; margin-top: 5px; color: #3b82f6; }
        .policy-note { font-size: 0.95rem; color: #475569; line-height: 1.6; border-top: 1px dotted var(--border); padding-top: 20px; }
        
        footer { text-align: center; padding: 30px 0; border-top: 1px solid var(--border); color: #94a3b8 !important; margin-top: 40px; width: 100%; }
        footer p { font-size: 13px !important; margin: 8px 0 !important; color: #94a3b8 !important; }
        footer a { color: var(--accent) !important; text-decoration: none !important; font-weight: 700 !important; font-size: 13px !important; margin: 0 10px; }
        @keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; } }
    </style>
</head>
<body>
    <div class="container">
        <header class="hero"><h1>Virginia Impact</h1></header>
        <main class="calc-card">
            <label>Monthly Insurance ($)</label><input type="number" id="ins" value="160" inputmode="decimal">
            <label>Violation Range</label><select id="mph"><option value="1.0">1-10 MPH Over</option><option value="1.7">11-20 MPH Over</option></select>
            <label class="ts-check"><input type="checkbox" id="ts_active" checked><span>Attend Virginia Traffic School?</span></label>
            <button class="main-btn" onclick="calc()">Calculate Total Cost</button>
            <div id="res" class="results">
                <div class="ad-native"><span>SPONSORED </span><a href="#">Compare 2026 Virginia Rates & Save →</a></div>
                <div class="total-box"><div style="font-size:0.75rem; text-transform:uppercase; color:#94a3b8;">Total 3-Year Estimated Loss</div><div class="val" id="val"></div></div>
                <div class="policy-note"><p><strong>Policy:</strong> Clinic adds 5 safe points once a year to offset violations.</p></div>
            </div>
        </main>
        <footer><p>© 2026 Ticket Impact Tool. For estimation purposes only.<a href="index.html">Home</a> <a href="privacy.html">Privacy Policy</a></p></footer>
    </div>
    <script>
        function calc() {
            const i = parseFloat(document.getElementById('ins').value) || 0;
            const m = parseFloat(document.getElementById('mph').value);
            const ts = document.getElementById('ts_active').checked;
            const total = Math.round((180 * m) + (ts ? 0 : (i * 12 * 0.42 * 3)) + 200);
            document.getElementById('res').style.display = 'block';
            document.getElementById('val').innerText = '$' + total.toLocaleString();
            setTimeout(() => { window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }); }, 100);
        }
    </script>
</body>
</html>
